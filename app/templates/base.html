<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AegisOTA - Android OTA 升级异常注入与多设备验证平台">
    <title>{% block title %}AegisOTA{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
</head>
<body>
    {% if csrf_token is defined %}
    <input type="hidden" id="csrf-token" value="{{ csrf_token }}" aria-hidden="true">
    <script>
        document.body.addEventListener('htmx:configRequest', function(evt) {
            var method = evt.detail.method.toUpperCase();
            if (method === 'POST' || method === 'PUT' || method === 'DELETE') {
                var csrfToken = document.getElementById('csrf-token')?.value || getCsrfTokenFromCookie();
                if (csrfToken) {
                    evt.detail.headers['X-CSRF-Token'] = csrfToken;
                }
            }
        });

        function getCsrfTokenFromCookie() {
            var cookies = document.cookie.split(';');
            for (var i = 0; i < cookies.length; i++) {
                var cookie = cookies[i].trim();
                if (cookie.startsWith('csrf_token=')) {
                    return cookie.substring('csrf_token='.length);
                }
            }
            return null;
        }
    </script>
    {% endif %}

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/" class="sidebar-brand">
                    <div class="sidebar-brand-icon">A</div>
                    <span class="sidebar-brand-text">AegisOTA</span>
                </a>
            </div>

            <nav class="sidebar-nav">
                <div class="sidebar-section">
                    <div class="sidebar-section-title">概览</div>
                    <ul class="sidebar-menu">
                        <li class="sidebar-menu-item">
                            <a href="/" class="sidebar-menu-link {% if request.path == '/' %}active{% endif %}">
                                <span class="sidebar-menu-icon">◈</span>
                                <span>仪表盘</span>
                            </a>
                        </li>
                    </ul>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-section-title">设备管理</div>
                    <ul class="sidebar-menu">
                        <li class="sidebar-menu-item">
                            <a href="/devices" class="sidebar-menu-link {% if '/devices' in request.path %}active{% endif %}">
                                <span class="sidebar-menu-icon">◉</span>
                                <span>设备列表</span>
                            </a>
                        </li>
                        <li class="sidebar-menu-item">
                            <a href="/pools" class="sidebar-menu-link {% if '/pools' in request.path %}active{% endif %}">
                                <span class="sidebar-menu-icon">◈</span>
                                <span>设备池</span>
                            </a>
                        </li>
                    </ul>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-section-title">任务管理</div>
                    <ul class="sidebar-menu">
                        <li class="sidebar-menu-item">
                            <a href="/runs" class="sidebar-menu-link {% if '/runs' in request.path and '/create' not in request.path %}active{% endif %}">
                                <span class="sidebar-menu-icon">▣</span>
                                <span>任务列表</span>
                            </a>
                        </li>
                        <li class="sidebar-menu-item">
                            <a href="/runs/create" class="sidebar-menu-link {% if '/runs/create' in request.path %}active{% endif %}">
                                <span class="sidebar-menu-icon">+</span>
                                <span>创建任务</span>
                            </a>
                        </li>
                        <li class="sidebar-menu-item">
                            <a href="/plans" class="sidebar-menu-link {% if '/plans' in request.path %}active{% endif %}">
                                <span class="sidebar-menu-icon">◫</span>
                                <span>升级计划</span>
                            </a>
                        </li>
                    </ul>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-section-title">诊断与报告</div>
                    <ul class="sidebar-menu">
                        <li class="sidebar-menu-item">
                            <a href="/diagnosis" class="sidebar-menu-link {% if '/diagnosis' in request.path %}active{% endif %}">
                                <span class="sidebar-menu-icon">◐</span>
                                <span>诊断记录</span>
                            </a>
                        </li>
                    </ul>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-section-title">系统</div>
                    <ul class="sidebar-menu">
                        <li class="sidebar-menu-item">
                            <a href="/settings" class="sidebar-menu-link {% if '/settings' in request.path %}active{% endif %}">
                                <span class="sidebar-menu-icon">⚙</span>
                                <span>设置</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-footer-text">AegisOTA v0.1.0</div>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-wrapper">
            <main class="content-area">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
