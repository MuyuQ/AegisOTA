<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AegisOTA - Android OTA 升级异常注入与多设备验证平台">
    <title>{% block title %}AegisOTA{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
</head>
<body>
    {% if csrf_token is defined %}
    <input type="hidden" id="csrf-token" value="{{ csrf_token }}" aria-hidden="true">
    <script>
        document.body.addEventListener('htmx:configRequest', function(evt) {
            var method = evt.detail.method.toUpperCase();
            if (method === 'POST' || method === 'PUT' || method === 'DELETE') {
                var csrfToken = document.getElementById('csrf-token')?.value || getCsrfTokenFromCookie();
                if (csrfToken) {
                    evt.detail.headers['X-CSRF-Token'] = csrfToken;
                }
            }
        });

        function getCsrfTokenFromCookie() {
            var cookies = document.cookie.split(';');
            for (var i = 0; i < cookies.length; i++) {
                var cookie = cookies[i].trim();
                if (cookie.startsWith('csrf_token=')) {
                    return cookie.substring('csrf_token='.length);
                }
            }
            return null;
        }
    </script>
    {% endif %}

    <nav class="navbar">
        <div class="container">
            <a href="/" class="navbar-brand">AegisOTA</a>
            <button type="button" class="navbar-toggle" aria-expanded="false" aria-controls="navbar-menu" aria-label="切换导航菜单" onclick="toggleNavbar()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <ul class="navbar-nav" id="navbar-menu">
                <li><a href="/">仪表盘</a></li>
                <li><a href="/devices">设备</a></li>
                <li><a href="/pools">设备池</a></li>
                <li><a href="/runs">任务</a></li>
                <li><a href="/runs/create">创建任务</a></li>
                <li><a href="/plans">计划</a></li>
                <li><a href="/diagnosis">诊断</a></li>
                <li><a href="/settings">设置</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>AegisOTA — Android OTA 升级异常注入与多设备验证平台</p>
        </div>
    </footer>

    <script>
        function toggleNavbar() {
            var menu = document.getElementById('navbar-menu');
            var toggle = document.querySelector('.navbar-toggle');
            var expanded = toggle.getAttribute('aria-expanded') === 'true';
            toggle.setAttribute('aria-expanded', !expanded);
            menu.classList.toggle('show');
        }

        // Close mobile menu when clicking outside
        document.addEventListener('click', function(e) {
            var menu = document.getElementById('navbar-menu');
            var toggle = document.querySelector('.navbar-toggle');
            if (!menu.contains(e.target) && !toggle.contains(e.target)) {
                menu.classList.remove('show');
                toggle.setAttribute('aria-expanded', 'false');
            }
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
