{% extends "base.html" %}

{% block title %}系统设置 - AegisOTA{% endblock %}

{% block content %}
<h1>系统设置</h1>

<div class="card" style="margin-top: 1.5rem;">
    <div class="card-header">执行配置</div>
    <form hx-post="/settings/config" hx-swap="innerHTML" hx-target="#config-result" style="margin-top: 0.5rem;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <table class="table">
            <tr>
                <td style="width: 200px;">
                    <label class="form-label" style="margin: 0;">最大并发任务数</label>
                </td>
                <td>
                    <input type="number" name="max_concurrent_runs" value="{{ max_concurrent_runs }}"
                           class="form-input" style="width: 100px;" min="1" max="20">
                </td>
            </tr>
            <tr>
                <td>
                    <label class="form-label" style="margin: 0;">默认超时时间 (秒)</label>
                </td>
                <td>
                    <input type="number" name="default_timeout" value="{{ default_timeout }}"
                           class="form-input" style="width: 100px;" min="60" max="3600">
                </td>
            </tr>
            <tr>
                <td>
                    <label class="form-label" style="margin: 0;">重启等待超时 (秒)</label>
                </td>
                <td>
                    <input type="number" name="reboot_wait_timeout" value="{{ reboot_wait_timeout }}"
                           class="form-input" style="width: 100px;" min="30" max="600">
                </td>
            </tr>
        </table>

        <div class="card-header" style="margin-top: 1rem;">Monkey 测试配置</div>
        <table class="table" style="margin-top: 0.5rem;">
            <tr>
                <td style="width: 200px;">
                    <label class="form-label" style="margin: 0;">默认事件数</label>
                </td>
                <td>
                    <input type="number" name="monkey_default_count" value="{{ monkey_default_count }}"
                           class="form-input" style="width: 120px;" min="100" max="100000">
                </td>
            </tr>
            <tr>
                <td>
                    <label class="form-label" style="margin: 0;">事件间隔 (ms)</label>
                </td>
                <td>
                    <input type="number" name="monkey_throttle" value="{{ monkey_throttle }}"
                           class="form-input" style="width: 100px;" min="10" max="1000">
                </td>
            </tr>
        </table>

        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">
            保存配置
        </button>
    </form>
    <div id="config-result" style="margin-top: 1rem;"></div>
</div>
{% endblock %}
